<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frassati Meeting Notes — slides.frassati.app</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #e8e6e3;
      --muted: #888;
      --accent: #c9a227;
      --accent-hover: #e0b82e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    header {
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 600;
      font-size: clamp(1.75rem, 4vw, 2.25rem);
      margin: 0 0 0.25rem 0;
      letter-spacing: 0.02em;
    }

    .subtitle {
      font-size: 0.95rem;
      color: var(--muted);
      margin: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .card {
      display: block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.15s ease, box-shadow 0.2s;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }

    .card:focus {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .thumb {
      aspect-ratio: 16/10;
      background: linear-gradient(145deg, #252525 0%, #1a1a1a 100%);
      border-radius: 8px;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 2.5rem;
    }

    .card h2 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 600;
      font-size: 1.25rem;
      margin: 0 0 0.35rem 0;
      line-height: 1.3;
    }

    .card .meta {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .card .view {
      margin-top: 0.75rem;
      font-size: 0.85rem;
      color: var(--accent);
      font-weight: 500;
    }

    .card:hover .view {
      color: var(--accent-hover);
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
    }

    .error {
      padding: 1rem;
      background: rgba(180, 60, 60, 0.15);
      border: 1px solid rgba(180, 60, 60, 0.4);
      border-radius: 8px;
      color: #e88;
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>Frassati Meeting Notes</h1>
      <p class="subtitle">slides.frassati.app</p>
    </header>

    <div id="app">
      <p class="loading">Loading…</p>
    </div>
  </div>

  <script>
    (function () {
      const app = document.getElementById('app');

      fetch('manifest.json')
        .then((r) => {
          if (!r.ok) throw new Error('Could not load manifest');
          return r.json();
        })
        .then((manifest) => {
          if (!manifest.length) {
            app.innerHTML = '<p class="loading">No slides found.</p>';
            return;
          }
          app.innerHTML = `
            <div class="grid">
              ${manifest
                .map(
                  (item) => `
                <a class="card" href="slides/${item.slug}.html">
                  <div class="thumb" aria-hidden="true">📄</div>
                  <h2>${escapeHtml(item.title)}</h2>
                  <p class="meta">${escapeHtml(item.file)}</p>
                  <span class="view">View slideshow →</span>
                </a>
              `
                )
                .join('')}
            </div>
          `;
        })
        .catch((err) => {
          app.innerHTML = `<p class="error">${escapeHtml(err.message)}. Run <code>npm run build</code> in the slides folder first.</p>`;
        });

      function escapeHtml(s) {
        const div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }
    })();
  </script>
</body>
</html>
